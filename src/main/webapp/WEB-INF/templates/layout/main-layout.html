<!DOCTYPE html>
<html lang="vi" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle : 'He thong khoa hoc tieng Anh'}">He thong khoa hoc tieng Anh</title>
    <link rel="stylesheet" th:href="@{/resources/css/site.css}">
</head>
<body>
<div class="app-shell">
    <header class="topbar">
        <div>
            <div class="brand">BrightGate English Center</div>
            <p class="slogan">Learn English with a clear roadmap and confident outcomes.</p>
        </div>
    </header>

    <nav class="navbar">
        <a th:href="@{/course/list}" th:classappend="${#httpServletRequest.requestURI == '/course/list' ? ' active' : ''}">
            Danh sach khoa hoc
        </a>
        <a th:href="@{/consultation}" th:classappend="${#httpServletRequest.requestURI == '/consultation' ? ' active' : ''}">
            Dang ky tu van
        </a>
    </nav>

    <main class="page-content" layout:fragment="content">
        <p>No content</p>
    </main>
</div>
</body>
</html>
